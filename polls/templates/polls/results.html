<style>
    body { background-color: #FF3E3E; font-family: 'Arial Black', sans-serif; padding: 50px; }
    .results-container { background: white; border: 4px solid #000; box-shadow: 12px 12px 0px #000; padding: 30px; }
    .bar-container { background: #eee; border: 2px solid #000; margin: 10px 0; height: 40px; position: relative; }
    .bar { background: #00F0FF; height: 100%; border-right: 2px solid #000; display: flex; align-items: center; padding-left: 10px; }

    .poll-footer-main {
    margin-top: 50px;
    background: #000;
    color: #fff;
    padding: 2rem;
    border-top: 6px solid #FF4DFF; /* Pink accent */
}

.footer-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1000px;
    margin: 0 auto;
    flex-wrap: wrap;
    gap: 20px;
}

.logo-text {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -1px;
    color: #FFD100; /* Yellow */
}

.footer-left p {
    font-family: sans-serif;
    font-size: 0.8rem;
    margin-top: 5px;
    color: #ccc;
}

.footer-links a {
    color: #fff;
    text-decoration: none;
    margin-left: 20px;
    font-size: 0.9rem;
    text-transform: uppercase;
    transition: color 0.2s;
}

.footer-links a:hover {
    color: #00F0FF; /* Cyan */
}

.panic-btn {
    background: #FF3E3E;
    padding: 8px 12px;
    border: 2px solid #fff;
    font-weight: bold;
}

.panic-btn:hover {
    background: #fff !important;
    color: #FF3E3E !important;
}

/* Make it look good on mobile */
@media (max-width: 600px) {
    .footer-content {
        flex-direction: column;
        text-align: center;
    }
    .footer-links a {
        display: block;
        margin: 10px 0;
    }
}
</style>

<div class="results-container">
    
    <h3>{{ question.question_text }}</h3>
    {% for choice in question.choice_set.all %}
        <p>{{ choice.choice_text }} ({{ choice.votes }} vote{{ choice.votes|pluralize }})</p>
        <div class="bar-container">
            <div class="bar" style="width: {% if choice.votes > 0 %}70%{% else %}5%{% endif %};">
                ⚡
            </div>
        </div>
    {% endfor %}

    <br>
    <a href="{% url 'polls:index' %}" style="color: black;">Vote again?</a>
</div>



<footer class="poll-footer-main">
    <div class="footer-content">

        <div class="footer-left">
            <p style="text-align: center;">SHELDON THOMAS</p>
            <p style="text-align: center;">COMP314 | ADVANCE APPLICATION DESIGN | ASSIGNMENT 3 | POLLS</p>  
        </div>       

    </div>
</footer>
